spring.application.name=securebank-backend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/securebank}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:604800000}
refresh-token.cookie.secure=${REFRESH_TOKEN_COOKIE_SECURE:false}
refresh-token.cookie.same-site=${REFRESH_TOKEN_COOKIE_SAME_SITE:Strict}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

admin.seed.enabled=${ADMIN_SEED_ENABLED:false}
admin.seed.email=${ADMIN_EMAIL:}
admin.seed.password=${ADMIN_PASSWORD:}

rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
rate-limit.general-limit=${RATE_LIMIT_GENERAL_LIMIT:600}
rate-limit.sensitive-limit=${RATE_LIMIT_SENSITIVE_LIMIT:60}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:securebank}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

securebank.rabbitmq.exchange=${RABBITMQ_EVENTS_EXCHANGE:securebank.events}
securebank.rabbitmq.transfer-completed-routing-key=${RABBITMQ_TRANSFER_COMPLETED_ROUTING_KEY:transfer.completed}
securebank.rabbitmq.declare-on-startup=${RABBITMQ_DECLARE_ON_STARTUP:true}
