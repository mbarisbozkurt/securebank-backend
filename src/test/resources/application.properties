spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.datasource.url=jdbc:h2:mem:securebank-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false
rate-limit.enabled=false

debug=false
logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF

jwt.secret=test-securebank-super-secret-key-securebank-super-secret-key
jwt.expiration=3600000
refresh-token.expiration=604800000
refresh-token.cookie.secure=false
refresh-token.cookie.same-site=Strict
cors.allowed-origins=http://localhost:5173

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

securebank.rabbitmq.exchange=securebank.events
securebank.rabbitmq.transfer-completed-routing-key=transfer.completed
securebank.rabbitmq.declare-on-startup=false
